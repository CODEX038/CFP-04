<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundChain</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Design tokens — original cream/teal palette (matching screenshots 1-6) ── */
      :root {
        /* Fonts */
        --font-serif: 'DM Serif Display', Georgia, serif;
        --font-sans:  'DM Sans', system-ui, sans-serif;

        /* Cream palette */
        --cream-50:  #fdfaf5;
        --cream-100: #f8f3ea;
        --cream-200: #ede5d5;
        --cream-300: #d9ccb8;

        /* Teal – primary brand colour */
        --teal-50:  #f0faf7;
        --teal-100: #d0f0e6;
        --teal-500: #0d7a6a;
        --teal-600: #0b6657;
        --teal-700: #094f44;

        /* Amber – secondary accent */
        --amber-50:  #fffbeb;
        --amber-100: #fef3c7;
        --amber-400: #fbbf24;
        --amber-500: #f59e0b;

        /* Ink – text scale */
        --ink-900: #1a140f;
        --ink-700: #3d3028;
        --ink-500: #6b5c4e;
        --ink-300: #9e8f82;
        --ink-100: #cfc4ba;

        /* Error */
        --error-50:  #fff1f2;
        --error-500: #e11d48;

        /* Radius */
        --radius-sm:   6px;
        --radius-md:   10px;
        --radius-lg:   16px;
        --radius-xl:   22px;
        --radius-full: 9999px;

        /* Shadows */
        --shadow-sm:   0 1px 3px rgba(26,20,15,.06), 0 1px 2px rgba(26,20,15,.04);
        --shadow-md:   0 4px 16px rgba(26,20,15,.10);
        --shadow-lg:   0 8px 32px rgba(26,20,15,.12);
        --shadow-card: 0 1px 4px rgba(26,20,15,.07);
      }

      /* ── Base ── */
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        color: var(--ink-500);
        background: var(--cream-50);
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* Scrollbar */
      ::-webkit-scrollbar             { width: 6px; }
      ::-webkit-scrollbar-track       { background: var(--cream-100); }
      ::-webkit-scrollbar-thumb       { background: var(--cream-300); border-radius: var(--radius-full); }
      ::-webkit-scrollbar-thumb:hover { background: var(--ink-100); }

      /* ── Typography ── */
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-serif);
        color: var(--ink-900);
        line-height: 1.15;
        letter-spacing: -0.01em;
      }
      p { line-height: 1.7; }
      em { font-style: italic; }

      /* ── Buttons ── */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 22px;
        border: none;
        border-radius: var(--radius-full);
        font-family: var(--font-sans);
        font-size: .875rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--teal-500), var(--teal-700));
        color: #fff;
        box-shadow: 0 4px 14px rgba(13,122,106,.3);
        transition: transform .15s, box-shadow .15s;
        white-space: nowrap;
        user-select: none;
      }
      .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,122,106,.4); }
      .btn-primary:active { transform: scale(.97); }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 22px;
        border: 1.5px solid var(--cream-300);
        border-radius: var(--radius-full);
        font-family: var(--font-sans);
        font-size: .875rem;
        font-weight: 500;
        cursor: pointer;
        background: #fff;
        color: var(--ink-700);
        transition: all .15s;
        white-space: nowrap;
        user-select: none;
      }
      .btn-secondary:hover { border-color: var(--ink-300); background: var(--cream-100); }

      /* ── Card ── */
      .card {
        background: #fff;
        border: 1px solid var(--cream-200);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-card);
      }

      /* ── Skeleton loader ── */
      .skeleton {
        background: linear-gradient(90deg, var(--cream-100) 25%, var(--cream-200) 50%, var(--cream-100) 75%);
        background-size: 200% 100%;
        animation: skeleton-wave 1.6s ease-in-out infinite;
        border-radius: var(--radius-sm);
      }

      /* ── Input ── */
      .input {
        width: 100%;
        background: #fff;
        border: 1.5px solid var(--cream-200);
        border-radius: var(--radius-full);
        padding: 9px 14px;
        font-family: var(--font-sans);
        font-size: .875rem;
        color: var(--ink-900);
        outline: none;
        transition: border-color .15s;
        caret-color: var(--teal-500);
      }
      .input::placeholder { color: var(--ink-100); }
      .input:focus        { border-color: var(--teal-500); }

      /* ── Progress bar ── */
      .progress-track {
        height: 6px;
        background: var(--cream-100);
        border-radius: var(--radius-full);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--teal-500), var(--amber-400));
        border-radius: var(--radius-full);
        transition: width .6s cubic-bezier(.4,0,.2,1);
      }

      /* ── Spinner ── */
      .spinner {
        width: 36px; height: 36px;
        border-radius: 50%;
        border: 2.5px solid var(--cream-200);
        border-top-color: var(--teal-500);
        animation: spin .75s linear infinite;
        display: inline-block;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes spin    { to{transform:rotate(360deg)} }
      @keyframes skeleton-wave {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .animate-fade-up   { animation: fadeUp .5s ease both; }
      .animate-fade-up-1 { animation: fadeUp .5s .08s ease both; }
      .animate-fade-up-2 { animation: fadeUp .5s .16s ease both; }
      .animate-pulse     { animation: pulse 2s infinite; }

      /* ── Utility ── */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      .hide-scrollbar { scrollbar-width: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* ── Responsive base ── */
      @media (max-width: 768px) { :root { font-size: 15px; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
