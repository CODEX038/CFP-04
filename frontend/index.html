<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FundChain</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset & base ── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        /* Typography */
        --font-serif: 'DM Serif Display', Georgia, serif;
        --font-sans:  'DM Sans', system-ui, sans-serif;

        /* Colour palette */
        --emerald-400: #34d399;
        --emerald-500: #10b981;
        --emerald-600: #059669;
        --amber-400:   #fbbf24;
        --amber-500:   #f59e0b;
        --red-400:     #f87171;

        --ink-900: #ffffff;
        --ink-600: rgba(255,255,255,0.75);
        --ink-400: rgba(255,255,255,0.48);
        --ink-200: rgba(255,255,255,0.22);
        --ink-100: rgba(255,255,255,0.10);
        --ink-050: rgba(255,255,255,0.05);

        --surface-card:   rgba(255,255,255,0.04);
        --surface-glass:  rgba(255,255,255,0.07);
        --border-subtle:  rgba(255,255,255,0.09);
        --border-medium:  rgba(255,255,255,0.14);

        --bg-base: #080c14;

        /* Radii */
        --radius-sm:   8px;
        --radius-md:   12px;
        --radius-lg:   18px;
        --radius-xl:   24px;
        --radius-full: 9999px;

        /* Shadows */
        --shadow-card: 0 20px 60px rgba(0,0,0,0.55);
        --shadow-btn:  0 6px 22px rgba(16,185,129,0.38);
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        color: var(--ink-600);
        background: var(--bg-base);
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* Scrollbar */
      ::-webkit-scrollbar              { width: 6px; }
      ::-webkit-scrollbar-track        { background: transparent; }
      ::-webkit-scrollbar-thumb        { background: rgba(255,255,255,0.12); border-radius: var(--radius-full); }
      ::-webkit-scrollbar-thumb:hover  { background: rgba(255,255,255,0.22); }

      /* ── Typography helpers ── */
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-serif);
        color: var(--ink-900);
        line-height: 1.15;
        letter-spacing: -0.01em;
      }

      p   { color: var(--ink-400); line-height: 1.75; }
      em  { font-style: italic; }

      /* ── Button primitives ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 11px 24px;
        border: none;
        border-radius: var(--radius-full);
        font-family: var(--font-sans);
        font-size: .875rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
        user-select: none;
        white-space: nowrap;
      }
      .btn:active { transform: scale(.97) !important; }

      .btn-primary {
        background: linear-gradient(135deg, var(--emerald-500), var(--emerald-600));
        color: #fff;
        box-shadow: var(--shadow-btn);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(16,185,129,0.48);
      }

      .btn-ghost {
        background: var(--surface-glass);
        border: 1px solid var(--border-medium);
        color: var(--ink-600);
        backdrop-filter: blur(12px);
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
      }

      /* ── Card ── */
      .card {
        background: var(--surface-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        overflow: hidden;
        backdrop-filter: blur(16px);
        transition: transform .22s ease, box-shadow .22s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-card);
      }

      /* ── Pill / badge ── */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 13px;
        border-radius: var(--radius-full);
        font-family: var(--font-sans);
        font-size: .72rem;
        font-weight: 600;
        letter-spacing: .05em;
        text-transform: uppercase;
      }
      .pill-emerald {
        background: rgba(16,185,129,0.12);
        border: 1px solid rgba(16,185,129,0.28);
        color: var(--emerald-400);
      }
      .pill-amber {
        background: rgba(245,158,11,0.12);
        border: 1px solid rgba(245,158,11,0.28);
        color: var(--amber-400);
      }

      /* ── Progress bar ── */
      .progress-track {
        height: 5px;
        background: rgba(255,255,255,0.08);
        border-radius: var(--radius-full);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--emerald-500), var(--amber-400));
        border-radius: var(--radius-full);
        transition: width .6s ease;
      }

      /* ── Skeleton loader ── */
      .skeleton {
        background: rgba(255,255,255,0.07);
        border-radius: var(--radius-sm);
        animation: shimmer 1.6s ease-in-out infinite;
      }

      /* ── Input ── */
      .input {
        width: 100%;
        background: var(--surface-glass);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-full);
        padding: 9px 14px;
        font-family: var(--font-sans);
        font-size: .875rem;
        color: #fff;
        outline: none;
        transition: border-color .15s;
        caret-color: var(--emerald-500);
      }
      .input::placeholder { color: rgba(255,255,255,0.25); }
      .input:focus        { border-color: rgba(16,185,129,0.5); }

      /* ── Animations ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0);     }
      }
      @keyframes shimmer {
        0%, 100% { opacity: .5; }
        50%       { opacity: .85; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1;   }
        50%       { opacity: .35; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .animate-fade-up   { animation: fadeUp .55s ease both; }
      .animate-fade-up-1 { animation: fadeUp .55s .1s ease both; }
      .animate-fade-up-2 { animation: fadeUp .55s .2s ease both; }
      .animate-pulse     { animation: pulse 2s infinite; }
      .animate-spin      { animation: spin .75s linear infinite; }

      /* ── Utility ── */
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      .hide-scrollbar { scrollbar-width: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        :root { font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
